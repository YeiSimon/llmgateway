{{- if .Values.valkey.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "llmgateway.fullname" . }}-valkey
  labels:
    {{- include "llmgateway.componentLabels" (dict "context" . "component" "valkey") | nindent 4 }}
spec:
  serviceName: {{ include "llmgateway.fullname" . }}-valkey
  replicas: 1
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "llmgateway.componentSelectorLabels" (dict "context" . "component" "valkey") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmgateway.componentSelectorLabels" (dict "context" . "component" "valkey") | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- include "llmgateway.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      {{- if not .Values.valkey.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
      containers:
        - name: valkey
          image: {{ .Values.valkey.image.repository }}:{{ .Values.valkey.image.tag }}
          imagePullPolicy: {{ .Values.valkey.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: valkey
              containerPort: 6379
              protocol: TCP
          {{- if .Values.valkey.password }}
          command:
            - valkey-server
            - --requirepass
            - $(VALKEY_PASSWORD)
            - --protected-mode
            - "no"
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llmgateway.secretName" . }}
                  key: VALKEY_PASSWORD
          {{- else }}
          command:
            - valkey-server
            - --protected-mode
            - "no"
          {{- end }}
          readinessProbe:
            exec:
              command:
                - valkey-cli
                {{- if .Values.valkey.password }}
                - -a
                - $(VALKEY_PASSWORD)
                {{- end }}
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - valkey-cli
                {{- if .Values.valkey.password }}
                - -a
                - $(VALKEY_PASSWORD)
                {{- end }}
                - ping
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      terminationGracePeriodSeconds: 30
      {{- with .Values.valkey.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.valkey.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.valkey.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.valkey.persistence.storageClass }}
        storageClassName: {{ .Values.valkey.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.valkey.persistence.size | default "2Gi" }}
  {{- end }}
{{- end }}
