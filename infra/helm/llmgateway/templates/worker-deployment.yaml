{{- if .Values.worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmgateway.fullname" . }}-worker
  labels:
    {{- include "llmgateway.componentLabels" (dict "context" . "component" "worker") | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "llmgateway.componentSelectorLabels" (dict "context" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmgateway.componentSelectorLabels" (dict "context" . "component" "worker") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- include "llmgateway.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "llmgateway.postgresql.host" . }} {{ include "llmgateway.postgresql.port" . }}; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
        - name: wait-for-valkey
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "llmgateway.valkey.host" . }} {{ include "llmgateway.valkey.port" . }}; do
                echo "Waiting for Valkey..."
                sleep 2
              done
      containers:
        - name: worker
          image: {{ include "llmgateway.image" (dict "context" . "image" .Values.worker.image) }}
          imagePullPolicy: {{ .Values.worker.image.pullPolicy | default "IfNotPresent" }}
          envFrom:
            - configMapRef:
                name: {{ include "llmgateway.configMapName" . }}
            - secretRef:
                name: {{ include "llmgateway.secretName" . }}
          {{- with .Values.worker.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
