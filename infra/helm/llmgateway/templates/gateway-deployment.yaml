{{- if .Values.gateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmgateway.fullname" . }}-gateway
  labels:
    {{- include "llmgateway.componentLabels" (dict "context" . "component" "gateway") | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "llmgateway.componentSelectorLabels" (dict "context" . "component" "gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmgateway.componentSelectorLabels" (dict "context" . "component" "gateway") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- include "llmgateway.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "llmgateway.postgresql.host" . }} {{ include "llmgateway.postgresql.port" . }}; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
        - name: wait-for-redis
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "llmgateway.redis.host" . }} {{ include "llmgateway.redis.port" . }}; do
                echo "Waiting for Redis..."
                sleep 2
              done
      containers:
        - name: gateway
          image: {{ include "llmgateway.image" (dict "context" . "image" .Values.gateway.image) }}
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            {{- if .Values.gateway.admin.enabled }}
            - name: admin
              containerPort: {{ .Values.gateway.admin.port }}
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "llmgateway.configMapName" . }}
            - secretRef:
                name: {{ include "llmgateway.secretName" . }}
          {{- with .Values.gateway.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
      terminationGracePeriodSeconds: 120
      {{- with .Values.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.gateway.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
