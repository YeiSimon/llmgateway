{{- if .Values.code.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llmgateway.fullname" . }}-code
  labels:
    {{- include "llmgateway.componentLabels" (dict "context" . "component" "code") | nindent 4 }}
spec:
  replicas: {{ .Values.code.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "llmgateway.componentSelectorLabels" (dict "context" . "component" "code") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "llmgateway.componentSelectorLabels" (dict "context" . "component" "code") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- include "llmgateway.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: code
          image: {{ include "llmgateway.image" (dict "context" . "image" .Values.code.image) }}
          imagePullPolicy: {{ .Values.code.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "llmgateway.configMapName" . }}
            - secretRef:
                name: {{ include "llmgateway.secretName" . }}
          {{- with .Values.code.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.code.resources | nindent 12 }}
      {{- with .Values.code.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.code.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
