{{- end }}

# ── Admin (internal only — restrict via ReferenceGrant or NetworkPolicy) ──────
{{- if and .Values.admin.enabled $hosts.admin }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
