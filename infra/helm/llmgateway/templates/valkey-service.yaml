{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llmgateway.fullname" . }}-valkey
  labels:
    {{- include "llmgateway.componentLabels" (dict "context" . "component" "valkey") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: valkey
      protocol: TCP
      name: valkey
  selector:
    {{- include "llmgateway.componentSelectorLabels" (dict "context" . "component" "valkey") | nindent 4 }}
{{- end }}
