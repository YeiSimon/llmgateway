{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "llmgateway.fullname" . }}
  labels:
    {{- include "llmgateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database
  {{- $pgUser := include "llmgateway.postgresql.user" . }}
  {{- $pgHost := include "llmgateway.postgresql.host" . }}
  {{- $pgPort := include "llmgateway.postgresql.port" . }}
  {{- $pgDB := include "llmgateway.postgresql.database" . }}
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: {{ printf "postgres://%s:%s@%s:%s/%s" $pgUser .Values.postgresql.password $pgHost $pgPort $pgDB | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.password | quote }}
  {{- else }}
  DATABASE_URL: {{ printf "postgres://%s:%s@%s:%s/%s" $pgUser .Values.externalPostgresql.password $pgHost $pgPort $pgDB | quote }}
  {{- end }}

  # Valkey
  {{- if .Values.valkey.enabled }}
  {{- if .Values.valkey.password }}
  VALKEY_PASSWORD: {{ .Values.valkey.password | quote }}
  REDIS_PASSWORD: {{ .Values.valkey.password | quote }}
  {{- end }}
  {{- else if .Values.externalValkey.password }}
  VALKEY_PASSWORD: {{ .Values.externalValkey.password | quote }}
  REDIS_PASSWORD: {{ .Values.externalValkey.password | quote }}
  {{- end }}

  # Auth
  AUTH_SECRET: {{ .Values.auth.authSecret | quote }}
  GATEWAY_API_KEY_HASH_SECRET: {{ .Values.auth.gatewayApiKeyHashSecret | quote }}

  # OAuth providers
  {{- if .Values.auth.github.clientId }}
  GITHUB_CLIENT_ID: {{ .Values.auth.github.clientId | quote }}
  {{- end }}
  {{- if .Values.auth.github.clientSecret }}
  GITHUB_CLIENT_SECRET: {{ .Values.auth.github.clientSecret | quote }}
  {{- end }}
  {{- if .Values.auth.google.clientId }}
  GOOGLE_CLIENT_ID: {{ .Values.auth.google.clientId | quote }}
  {{- end }}
  {{- if .Values.auth.google.clientSecret }}
  GOOGLE_CLIENT_SECRET: {{ .Values.auth.google.clientSecret | quote }}
  {{- end }}

  # LLM Provider API keys
  {{- range $key, $value := .Values.llmProviders }}
  {{- if $value }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}

  # Stripe
  {{- with .Values.stripe }}
  {{- if .secretKey }}
  STRIPE_SECRET_KEY: {{ .secretKey | quote }}
  {{- end }}
  {{- if .webhookSecret }}
  STRIPE_WEBHOOK_SECRET: {{ .webhookSecret | quote }}
  {{- end }}
  {{- if .proMonthlyPriceId }}
  STRIPE_PRO_MONTHLY_PRICE_ID: {{ .proMonthlyPriceId | quote }}
  {{- end }}
  {{- if .proYearlyPriceId }}
  STRIPE_PRO_YEARLY_PRICE_ID: {{ .proYearlyPriceId | quote }}
  {{- end }}
  {{- if .devPlanLitePriceId }}
  STRIPE_DEV_PLAN_LITE_PRICE_ID: {{ .devPlanLitePriceId | quote }}
  {{- end }}
  {{- if .devPlanProPriceId }}
  STRIPE_DEV_PLAN_PRO_PRICE_ID: {{ .devPlanProPriceId | quote }}
  {{- end }}
  {{- if .devPlanMaxPriceId }}
  STRIPE_DEV_PLAN_MAX_PRICE_ID: {{ .devPlanMaxPriceId | quote }}
  {{- end }}
  {{- end }}

  # Email
  {{- if .Values.email.resendApiKey }}
  RESEND_API_KEY: {{ .Values.email.resendApiKey | quote }}
  {{- end }}
  {{- if .Values.email.resendAudienceId }}
  RESEND_AUDIENCE_ID: {{ .Values.email.resendAudienceId | quote }}
  {{- end }}

  # Notifications
  {{- if .Values.notifications.discordWebhookUrl }}
  DISCORD_NOTIFICATION_URL: {{ .Values.notifications.discordWebhookUrl | quote }}
  {{- end }}

  # Analytics
  {{- if .Values.observability.posthogKey }}
  POSTHOG_KEY: {{ .Values.observability.posthogKey | quote }}
  {{- end }}
{{- end }}
