# -- LLM Gateway Helm Chart Values
# Full documentation: https://llmgateway.io/docs

# -- Override the chart name
nameOverride: ""
# -- Override the full release name
fullnameOverride: ""
# -- Use an existing Kubernetes Secret instead of creating one (must contain all required keys)
existingSecret: ""

# =============================================================================
# Global settings
# =============================================================================
global:
  # -- Default image registry for all services
  image:
    registry: ghcr.io
    # -- Default image tag (overrides appVersion from Chart.yaml)
    tag: ""
  # -- Additional labels applied to all resources
  labels: {}
  # -- Image pull secrets for private registries
  imagePullSecrets: []
  # -- Node environment
  nodeEnv: production

# =============================================================================
# Public-facing URLs
# Set these to match your Ingress hostnames or external load balancer URLs.
# =============================================================================
urls:
  ui: ""
  api: ""
  gateway: ""
  playground: ""
  code: ""
  docs: ""
  admin: ""

# =============================================================================
# Authentication & Security
# =============================================================================
auth:
  # -- (required) Secret used for signing auth tokens (32+ characters)
  authSecret: "change-me-to-a-random-32-char-secret"
  # -- (required) HMAC secret for hashing API keys
  gatewayApiKeyHashSecret: "change-me-to-a-random-secret"
  # -- Cookie domain for session cookies
  cookieDomain: ""
  # -- Comma-separated list of allowed CORS origins
  originUrls: ""
  # -- Enable hosted mode
  hosted: ""
  # -- GitHub OAuth
  github:
    clientId: ""
    clientSecret: ""
  # -- Google OAuth
  google:
    clientId: ""
    clientSecret: ""
  # -- Passkey / WebAuthn configuration
  passkey:
    rpId: ""
    rpName: "LLMGateway"

# =============================================================================
# Database connection pool settings
# =============================================================================
database:
  poolMax: 20
  poolMin: 2
  idleTimeoutMs: 30000
  connectionTimeoutMs: 10000

# =============================================================================
# API Service
# =============================================================================
api:
  enabled: true
  replicas: 1
  # -- Run database migrations on startup
  runMigrations: true
  image:
    registry: ""
    repository: theopenco/llmgateway-api
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  config:
    timeoutMs: 5000
  # -- Additional environment variables
  extraEnv: []
  nodeSelector: {}
  tolerations: []

# =============================================================================
# Gateway Service
# =============================================================================
gateway:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: theopenco/llmgateway-gateway
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
  admin:
    # -- Expose gateway admin/server routes on a separate private service.
    enabled: true
    port: 4003
    host: "0.0.0.0"
    service:
      type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  config:
    gatewayTimeoutMs: 1500000
    aiStreamingTimeoutMs: 1200000
    aiTimeoutMs: 600000
    keepAliveTimeoutS: 620
    shutdownGracePeriodMs: 1200000
    healthCheckSkipDatabase: ""
    healthCheckTimeoutMs: 15000
    maxStreamingBufferMb: 50
  extraEnv: []
  nodeSelector: {}
  tolerations: []

# =============================================================================
# UI Dashboard (Next.js)
# =============================================================================
ui:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: theopenco/llmgateway-ui
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  extraEnv: []
  nodeSelector: {}
  tolerations: []

# =============================================================================
# Playground (Next.js)
# =============================================================================
playground:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: theopenco/llmgateway-playground
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  extraEnv: []
  nodeSelector: {}
  tolerations: []

# =============================================================================
# Code App (Next.js)
# =============================================================================
code:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: theopenco/llmgateway-code
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  extraEnv: []
  nodeSelector: {}
  tolerations: []

# =============================================================================
# Documentation (Next.js)
# =============================================================================
docs:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: theopenco/llmgateway-docs
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  extraEnv: []
  nodeSelector: {}
  tolerations: []

# =============================================================================
# Admin Dashboard (Enterprise, Next.js)
# Expose this on its own host to access admin pages such as /settings.
# =============================================================================
admin:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: theopenco/llmgateway-admin
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  extraEnv: []
  nodeSelector: {}
  tolerations: []

# =============================================================================
# Background Worker
# =============================================================================
worker:
  enabled: true
  replicas: 1
  image:
    registry: ""
    repository: theopenco/llmgateway-worker
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  config:
    backfillDurationSeconds: 300
    enableDataRetentionCleanup: false
    emailFollowUps: false
    logQueueBatchSize: 100
    creditBatchSize: 100
    creditBatchInterval: 5
  extraEnv: []
  nodeSelector: {}
  tolerations: []

# =============================================================================
# Built-in PostgreSQL
# Set enabled: false to use an external database (configure externalPostgresql).
# =============================================================================
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  user: postgres
  password: "changeme"
  database: llmgateway
  port: 5432
  persistence:
    enabled: true
    size: 10Gi
    # -- Storage class (leave empty for cluster default)
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- External PostgreSQL (used when postgresql.enabled is false)
externalPostgresql:
  host: ""
  port: 5432
  user: postgres
  password: ""
  database: llmgateway

# =============================================================================
# Built-in Valkey
# Set enabled: false to use an external Valkey (configure externalValkey).
# =============================================================================
valkey:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "8-alpine"
    pullPolicy: IfNotPresent
  # -- Valkey password (leave empty for no authentication)
  password: ""
  port: 6379
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []

# -- External Valkey (used when valkey.enabled is false)
externalValkey:
  host: ""
  port: 6379
  password: ""

# =============================================================================
# Kubernetes Gateway API (recommended — replaces deprecated nginx Ingress)
# Requires Envoy Gateway or another Gateway API implementation installed.
#
# Install Envoy Gateway:
#   helm install eg oci://docker.io/envoyproxy/gateway-helm \
#     --version v1.4.0 -n envoy-gateway-system --create-namespace
#
# Two routing modes:
#
#   mode: port      — no domain needed. Each service gets its own port on a
#                     single LoadBalancer IP (UI :3002, API :4002, etc.).
#                     The Gateway resource is created by this chart.
#
#   mode: hostname  — virtual-host routing. Requires real domain names set in
#                     the hosts block below. The Gateway resource must exist
#                     externally (e.g. created by Envoy Gateway's own chart).
# =============================================================================
httpRoutes:
  enabled: false
  # -- "port" (raw IP, no domain) or "hostname" (domain-based virtual hosting)
  mode: port
  # -- Name of the Gateway resource
  gatewayName: llmgateway
  # -- Namespace of the external Gateway (hostname mode only)
  gatewayNamespace: envoy-gateway-system
  # -- Per-service hostnames (hostname mode only — leave empty in port mode)
  hosts:
    ui: ""
    api: ""
    gateway: ""
    playground: ""
    code: ""
    docs: ""
    admin: ""
  # -- Timeout in seconds for gateway (AI) routes — default 600s for streaming
  gatewayTimeoutSeconds: 600

# =============================================================================
# Ingress (legacy — nginx Ingress was archived Jan 2026, use httpRoutes above)
# =============================================================================
ingress:
  enabled: false
  # -- Ingress class name (e.g., nginx, traefik)
  className: ""
  # -- Additional Ingress annotations
  annotations: {}
    # nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  # -- Per-service hostnames
  hosts:
    ui: ""
    api: ""
    gateway: ""
    playground: ""
    code: ""
    docs: ""
    admin: ""
  # -- TLS configuration
  tls: []
  #  - secretName: llmgateway-tls
  #    hosts:
  #      - app.example.com
  #      - api.example.com
  #      - gateway.example.com

