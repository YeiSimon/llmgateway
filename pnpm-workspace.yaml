packages:
  - apps/*
  - packages/*
  - ee/*

allowBuilds:
  core-js: true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@tailwindcss/oxide'
  - better-sqlite3
  - core-js
  - esbuild
  - protobufjs
  - sharp
  - unrs-resolver
