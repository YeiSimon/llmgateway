packages:
  - apps/*
  - packages/*
  - ee/*

overrides:
  shiki: 3.22.0
  flatted: '>=3.4.0'
  rollup: '>=4.59.0'
  handlebars: '>=4.7.9'
  protobufjs: ^7.5.6
  kysely: ^0.28.17
  minimatch@>=3 <3.1.4: ^3.1.4
  minimatch@>=4 <4.2.5: ^4.2.5
  minimatch@>=5 <5.1.8: ^5.1.8
  minimatch@>=6 <6.2.2: ^6.2.2
  minimatch@>=7 <7.4.8: ^7.4.8
  minimatch@>=8 <8.0.6: ^8.0.6
  minimatch@>=9 <9.0.7: ^9.0.7
  minimatch@>=10 <10.2.3: ^10.2.3
  defu@<6.1.5: ^6.1.7
  lodash@<4.18.0: ^4.18.1
  lodash-es@<4.18.0: ^4.18.1
  picomatch@<2.3.2: ^2.3.2
  picomatch@>=4 <4.0.4: ^4.0.4
  fast-uri@<3.1.2: ^3.1.2
  fast-xml-builder@<1.1.7: ^1.1.7

packageExtensions:
  '@hookform/resolvers':
    peerDependencies:
      zod: '*'
  streamdown:
    dependencies:
      shiki: 3.22.0

allowBuilds:
  core-js: true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@tailwindcss/oxide'
  - better-sqlite3
  - core-js
  - esbuild
  - protobufjs
  - sharp
  - unrs-resolver
